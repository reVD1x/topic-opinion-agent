services:
  db:
    image: postgres:15
    container_name: demo-topic-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-postgres}
      POSTGRES_DB: ${PG_DB:-topic_opinion}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./MindSpider/schema/mindspider_tables_postgres.sql:/docker-entrypoint-initdb.d/01_mindspider_tables_postgres.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-postgres} -d ${PG_DB:-topic_opinion}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: demo-topic-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PG_HOST: db
      PG_PORT: 5432
      DB_DIALECT: postgresql
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: demo-topic-ui
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PG_HOST: db
      PG_PORT: 5432
      DB_DIALECT: postgresql
    command: streamlit run app/ui/streamlit_app.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    depends_on:
      db:
        condition: service_healthy

  crawler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: demo-topic-crawler
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PG_HOST: db
      PG_PORT: 5432
      DB_DIALECT: postgresql
      MINDSPIDER_ENABLED: "true"
      MINDSPIDER_CRAWLER_LOOP: "true"
      MINDSPIDER_RUN_ON_START: "true"
    command: python app/mindspider_crawler.py
    depends_on:
      db:
        condition: service_healthy

volumes:
  pg_data:
